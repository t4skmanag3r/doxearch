name: Build Executables

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    strategy:
      fail-fast: false  # Continue other builds if one fails
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            executable_name: doxearch-gui
            artifact_name: doxearch-gui-linux
          - os: windows-latest
            executable_name: doxearch-gui.exe
            artifact_name: doxearch-gui-windows
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90  # Increase timeout
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install uv (Unix)
      if: runner.os != 'Windows'
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
    
    - name: Install uv (Windows)
      if: runner.os == 'Windows'
      run: irm https://astral.sh/uv/install.ps1 | iex
      shell: powershell
    
    # Cache Nuitka build artifacts
    - name: Cache Nuitka
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/Nuitka
          ~/AppData/Local/Nuitka
          ~/.ccache
          ~/AppData/Local/ccache
        key: ${{ runner.os }}-nuitka-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-
    
    - name: Install dependencies
      run: |
        uv sync --all-extras
    
    - name: Install ccache (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y ccache
    
    # Set up ccache for Windows
    - name: Set up ccache (Windows)
      if: runner.os == 'Windows'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-ccache
        max-size: 2G
    
    - name: Build executable
      run: |
        uv run python build_nuitka.py
      env:
        CCACHE_DIR: ${{ runner.os == 'Windows' && 'C:\ccache' || '~/.ccache' }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.executable_name }}
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.executable_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}